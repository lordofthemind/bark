ded(path: \u0026str, patterns: \u0026[String]) -\u003e bool {\n    for pattern in patterns {\n        if let Ok(p) = glob::Pattern::new(pattern) {\n            if p.matches(path) {\n                return true;\n            }\n        }\n        // Also try matching just the filename component against patterns like *.min.*\n        if let Some(fname) = Path::new(path).file_name() {\n            let fname_str = fname.to_string_lossy();\n            if let Ok(p) = glob::Pattern::new(pattern) {\n                if p.matches(\u0026fname_str) {\n                    return true;\n                }\n            }\n        }\n    }\n    false\n}\n\nfn is_binary(path: \u0026Path) -\u003e bool {\n    let mut file = match std::fs::File::open(path) {\n        Ok(f) =\u003e f,\n        Err(_) =\u003e return false,\n    };\n    let mut buf = [0u8; 8192];\n    let n = match file.read(\u0026mut buf) {\n        Ok(n) =\u003e n,\n        Err(_) =\u003e return false,\n    };\n    content_inspector::inspect(\u0026buf[..n]) == content_inspector::ContentType::BINARY\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::config::{Config, CustomExtension};\n\n    #[test]\n    fn is_excluded_dir_glob() {\n        assert!(is_path_excluded(\"dist/foo.js\", \u0026[\"dist/**\".to_string()]));\n        assert!(is_path_excluded(\"node_modules/lodash/index.js\", \u0026[\"node_modules/**\".to_string()]));\n    }\n\n    #[test]\n    fn is_excluded_wildcard_ext() {\n        assert!(is_path_excluded(\"app.min.js\", \u0026[\"*.min.*\".to_string()]));\n        assert!(is_path_excluded(\"vendor.bundle.js\", \u0026[\"*.bundle.*\".to_string()]));\n    }\n\n    #[test]\n    fn is_excluded_no_match() {\n        let patterns = vec![\"target/**\".to_string(), \"dist/**\".to_string()];\n        assert!(!is_path_excluded(\"src/main.rs\", \u0026patterns));\n        assert!(!is_path_excluded(\"README.md\", \u0026patterns));\n    }\n\n    #[test]\n    fn is_excluded_empty_patterns() {\n        assert!(!is_path_excluded(\"src/main.rs\", \u0026[]));\n    }\n\n    #[test]\n    fn resolve_style_custom_overrides_builtin() {\n        let mut config = Config::default();\n        config.extensions.custom = vec![\n            CustomExtension { ext: \"rs\".to_string(), style: \"hash\".to_string() },\n        ];\n        let config = std::sync::Arc::new(config);\n        let walker = Walker::new(\n            std::path::PathBuf::from(\".\"),\n            config,\n            std::path::PathBuf::from(\"tree.txt\"),\n            std::path::PathBuf::from(\".bark_backups\"),\n        );\n        // .rs normally maps to Slash; custom override sets it to Hash\n        assert_eq!(walker.resolve_style(\"rs\"), Some(CommentStyle::Hash));\n    }\n\n    #[test]\n    fn resolve_style_builtin_fallthrough() {\n        let config = std::sync::Arc::new(Config::default());\n        let walker = Walker::new(\n            std::path::PathBuf::from(\".\"),\n            config,\n            std::path::PathBuf::from(\"tree.txt\"),\n            std::path::PathBuf::from(\".bark_backups\"),\n        );\n        assert_eq!(walker.resolve_style(\"go\"), Some(CommentStyle::Slash));\n        assert_eq!(walker.resolve_style(\"py\"), Some(CommentStyle::Hash));\n        assert_eq!(walker.resolve_style(\"xyz\"), None);\n    }\n\n    #[test]\n    fn resolve_style_custom_css_and_html() {\n        let mut config = Config::default();\n        config.extensions.custom = vec![\n            CustomExtension { ext: \"mytml\".to_string(), style: \"html\".to_string() },\n            CustomExtension { ext: \"mystyle\".to_string(), style: \"css\".to_string() },\n            CustomExtension { ext: \"myunknown\".to_string(), style: \"invalid\".to_string() },\n        ];\n        let config = std::sync::Arc::new(config);\n        let walker = Walker::new(\n            std::path::PathBuf::from(\".\"),\n            config,\n            std::path::PathBuf::from(\"tree.txt\"),\n            std::path::PathBuf::from(\".bark_backups\"),\n        );\n        assert_eq!(walker.resolve_style(\"mytml\"), Some(CommentStyle::Html));\n        assert_eq!(walker.resolve_style(\"mystyle\"), Some(CommentStyle::Css));\n        assert_eq!(walker.resolve_style(\"myunknown\"), None); // invalid style → None\n    }\n\n    #[test]\n    fn is_excluded_subdir_filename_match() {\n        // File in subdir: full path doesn't match *.min.* but filename does\n        assert!(is_path_excluded(\"subdir/app.min.js\", \u0026[\"*.min.*\".to_string()]));\n        assert!(is_path_excluded(\"deep/nested/vendor.bundle.js\", \u0026[\"*.bundle.*\".to_string()]));\n    }\n}\n","traces":[{"line":23,"address":[6865760],"length":1,"stats":{"Line":3}},{"line":32,"address":[6923313,6923903,6919904],"length":1,"stats":{"Line":1}},{"line":33,"address":[6679714],"length":1,"stats":{"Line":9}},{"line":34,"address":[6519872,6519893],"length":1,"stats":{"Line":10}},{"line":36,"address":[6920211],"length":1,"stats":{"Line":1}},{"line":43,"address":[6920545],"length":1,"stats":{"Line":4}},{"line":45,"address":[6680413,6680503,6680304],"length":1,"stats":{"Line":8}},{"line":46,"address":[6680557],"length":1,"stats":{"Line":3}},{"line":47,"address":[6680734],"length":1,"stats":{"Line":3}},{"line":51,"address":[6867178,6867273],"length":1,"stats":{"Line":7}},{"line":54,"address":[6867311],"length":1,"stats":{"Line":4}},{"line":58,"address":[6743291,6743264],"length":1,"stats":{"Line":3}},{"line":61,"address":[6921517,6921654,6921579],"length":1,"stats":{"Line":11}},{"line":66,"address":[6921709],"length":1,"stats":{"Line":3}},{"line":67,"address":[6867755],"length":1,"stats":{"Line":4}},{"line":72,"address":[6868018,6867943],"length":1,"stats":{"Line":7}},{"line":77,"address":[6922307],"length":1,"stats":{"Line":3}},{"line":78,"address":[6922433],"length":1,"stats":{"Line":4}},{"line":83,"address":[6922454],"length":1,"stats":{"Line":3}},{"line":84,"address":[6922535],"length":1,"stats":{"Line":4}},{"line":86,"address":[6682407,6682325],"len  (tx, rx) = std::sync::mpsc::channel::\u003cnotify::Result\u003cEvent\u003e\u003e();\n\n        let mut watcher = RecommendedWatcher::new(\n            move |event: notify::Result\u003cEvent\u003e| {\n                tx.send(event).ok();\n            },\n            notify::Config::default(),\n        )?;\n\n        watcher.watch(root, RecursiveMode::Recursive)?;\n\n        // Track files bark itself just wrote so we don't re-process them\n        let recently_written: Arc\u003cMutex\u003cHashSet\u003cPathBuf\u003e\u003e\u003e =\n            Arc::new(Mutex::new(HashSet::new()));\n\n        loop {\n            // Check stop flag first\n            if stop.as_ref().map_or(false, |s| s.load(Ordering::Relaxed)) {\n                break;\n            }\n\n            // Wait for an event with a short timeout so we can poll the stop flag\n            let first_event = match rx.recv_timeout(Duration::from_millis(100)) {\n                Ok(Ok(e)) =\u003e e,\n                Ok(Err(_)) =\u003e continue,\n                Err(std::sync::mpsc::RecvTimeoutError::Timeout) =\u003e continue,\n                Err(std::sync::mpsc::RecvTimeoutError::Disconnected) =\u003e break,\n            };\n\n            // Collect additional events within the debounce window\n            let deadline = Instant::now() + Duration::from_millis(self.debounce_ms);\n            let mut events = vec![first_event];\n\n            loop {\n                let remaining = deadline.saturating_duration_since(Instant::now());\n                if remaining.is_zero() {\n                    break;\n                }\n                match rx.recv_timeout(remaining) {\n                    Ok(Ok(e)) =\u003e events.push(e),\n                    _ =\u003e break,\n                }\n            }\n\n            // Collect paths that need processing\n            let mut paths: HashSet\u003cPathBuf\u003e = HashSet::new();\n            for event in \u0026events {\n                if is_write_event(\u0026event.kind) {\n     <script>const e = React.createElement;

function pathToString(path) {
  if (path[0] === '/') {
    return '/' + path.slice(1).join('/');
  } else {
    return path.join('/');
  }
}

function findCommonPath(files) {
  if (!files || !files.length) {
    return [];
  }

  function isPrefix(arr, prefix) {
    if (arr.length < prefix.length) {
      return false;
    }
    for (let i = prefix.length - 1; i >= 0; --i) {
      if (arr[i] !== prefix[i]) {
        return false;
      }
    }
    return true;
  }

  let commonPath = files[0].path.slice(0, -1);
  while (commonPath.length) {
    if (files.every(file => isPrefix(file.path, commonPath))) {
      break;
    }
    commonPath.pop();
  }
  return commonPath;
}

function findFolders(files) {
  if (!files || !files.length) {
    return [];
  }

  let folders = files.filter(file => file.path.length > 1).map(file => file.path[0]);
  folders = [...new Set(folders)]; // unique
  folders.sort();

  folders = folders.map(folder => {
    let filesInFolder = files
      .filter(file => file.path[0] === folder)
      .map(file => ({
        ...file,
        path: file.path.slice(1),
        parent: [...file.parent, file.path[0]],
      }));

    const children = findFolders(filesInFolder); // recursion

    return {
      is_folder: true,
      path: [folder],
      parent: files[0].parent,
      children,
      covered: children.reduce((sum, file) => sum + file.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.coverable, 0),
      prevRun: {
        covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
        coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
      },
    };
  });

  return [...folders, ...files.filter(file => file.path.length === 1)];
}

class App extends React.Component {
  constructor(...args) {
    super(...args);

    this.state = {
      current: [],
    };
  }

  componentDidMount() {
    this.updateStateFromLocation();
    window.addEventListener('hashchange', () => this.updateStateFromLocation(), false);
  }

  updateStateFromLocation() {
    if (window.location.hash.length > 1) {
      const current = window.location.hash.slice(1).split('/');
      this.setState({current});
    } else {
      this.setState({current: []});
    }
  }

  getCurrentPath() {
    let file = this.props.root;
    let path = [file];
    for (let p of this.state.current) {
      file = file.children.find(file => file.path[0] === p);
      if (!file) {
        return path;
      }
      path.push(file);
    }
    return path;
  }

  render() {
    const path = this.getCurrentPath();
    const file = path[path.length - 1];

    let w = null;
    if (file.is_folder) {
      w = e(FilesList, {
        folder: file,
        onSelectFile: this.selectFile.bind(this),
        onBack: path.length > 1 ? this.back.bind(this) : null,
      });
    } else {
      w = e(DisplayFile, {
        file,
        onBack: this.back.bind(this),
      });
    }

    return e('div', {className: 'app'}, w);
  }

  selectFile(file) {
    this.setState(
      ({current}) => {
        return {current: [...current, file.path[0]]};
      },
      () => this.updateHash(),
    );
  }

  back(file) {
    this.setState(
      ({current}) => {
        return {current: current.slice(0, current.length - 1)};
      },
      () => this.updateHash(),
    );
  }

  updateHash() {
    if (!this.state.current || !this.state.current.length) {
      window.location = '#';
    } else {
      window.location = '#' + this.state.current.join('/');
    }
  }
}

function FilesList({folder, onSelectFile, onBack}) {
  let files = folder.children;
  return e(
    'div',
    {className: 'display-folder'},
    e(FileHeader, {file: folder, onBack}),
    e(
      'table',
      {className: 'files-list'},
      e('thead', {className: 'files-list__head'}, e('tr', null, e('th', null, 'Path'), e('th', null, 'Coverage'))),
      e(
        'tbody',
        {className: 'files-list__body'},
        files.map(file => e(File, {file, onClick: onSelectFile})),
      ),
    ),
  );
}

function File({file, onClick}) {
  const coverage = file.coverable ? (file.covered / file.coverable) * 100 : -1;
  const coverageDelta =
    file.prevRun && (file.covered / file.coverable) * 100 - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'tr',
    {
      className:
        'files-list__file' +
        (coverage >= 0 && coverage < 50 ? ' files-list__file_low' : '') +
        (coverage >= 50 && coverage < 80 ? ' files-list__file_medium' : '') +
        (coverage >= 80 ? ' files-list__file_high' : '') +
        (file.is_folder ? ' files-list__file_folder' : ''),
      onClick: () => onClick(file),
    },
    e('td', null, e('a', null, pathToString(file.path))),
    e(
      'td',
      null,
      file.covered + ' / ' + file.coverable + (coverage >= 0 ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
    ),
  );
}

function DisplayFile({file, onBack}) {
  return e('div', {className: 'display-file'}, e(FileHeader, {file, onBack}), e(FileContent, {file}));
}

function FileHeader({file, onBack}) {
  const coverage = (file.covered / file.coverable) * 100;
  const coverageDelta = file.prevRun && coverage - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'div',
    {className: 'file-header'},
    onBack ? e('a', {className: 'file-header__back', onClick: onBack}, 'Back') : null,
    e('div', {className: 'file-header__name'}, pathToString([...file.parent, ...file.path])),
    e(
      'div',
      {className: 'file-header__stat'},
      'Covered: ' + file.covered + ' of ' + file.coverable + (file.coverable ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
      e('input', {id: 'theme-toggle', type: 'checkbox', hidden: true}),
      e('label', {for: 'theme-toggle', id: 'theme-toggle-label'}, '🌙'),
    ),
  );
}

function FileContent({file}) {
  return e(
    'pre',
    {className: 'file-content'},
    file.content.split(/\r?\n/).map((line, index) => {
      const trace = file.traces.find(trace => trace.line === index + 1);
      const covered = trace && trace.stats.Line;
      const uncovered = trace && !trace.stats.Line;
      const nbHit = covered? trace.stats.Line: 0;
      return e(
        'div',
        { className: 'code-text-container' },
        e(
          'code',
          {
            className: 'code-line' + (covered ? ' code-line_covered' : '') + (uncovered ? ' code-line_uncovered' : ''),
          },
          line
        ),
        e(
          'div',
          { className: 'cover-indicator' + (covered? ' check-cover': '') + (uncovered? ' no-cover': '')},
          e(
            'div',
            { className: (covered? 'stat-line-hit': '')},
            covered? nbHit: ""
          )
        )
      );
    }),
  );
}

(function () {
  const commonPath = findCommonPath(data.files);
  const prevFilesMap = new Map();

  previousData &&
    previousData.files.forEach(file => {
      const path = file.path.slice(commonPath.length).join('/');
      prevFilesMap.set(path, file);
    });

  const files = data.files.map(file => {
    const path = file.path.slice(commonPath.length);
    const {covered = 0, coverable = 0} = prevFilesMap.get(path.join('/')) || {};
    return {
      ...file,
      path,
      parent: commonPath,
      prevRun: {covered, coverable},
    };
  });

  const children = findFolders(files);

  const root = {
    is_folder: true,
    children,
    path: commonPath,
    parent: [],
    covered: children.reduce((sum, file) => sum + file.covered, 0),
    coverable: children.reduce((sum, file) => sum + file.coverable, 0),
    prevRun: {
      covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
    },
  };

  ReactDOM.render(e(App, {root, prevFilesMap}), document.getElementById('root'));

  const toggle = document.getElementById('theme-toggle');
  const label = document.getElementById('theme-toggle-label');
  label.textContent = '🌙';

  toggle.addEventListener('change', () => {
    if (toggle.checked) {
      document.documentElement.setAttribute('data-theme', 'dark');
      label.textContent = '☀️';
    } else {
      document.documentElement.removeAttribute('data-theme');
      label.textContent = '🌙';
    }
  });
})();
</script>
