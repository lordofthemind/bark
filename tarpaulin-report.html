cursiveMode, Watcher};\nuse std::collections::HashSet;\nuse std::path::{Path, PathBuf};\nuse std::sync::atomic::{AtomicBool, Ordering};\nuse std::sync::{Arc, Mutex};\nuse std::time::{Duration, Instant};\n\npub struct FileWatcher {\n    pub processor: Arc\u003cProcessor\u003e,\n    pub debounce_ms: u64,\n    pub output_path: PathBuf,\n    pub dry_run: bool,\n}\n\nimpl FileWatcher {\n    pub fn new(\n        processor: Arc\u003cProcessor\u003e,\n        debounce_ms: u64,\n        output_path: PathBuf,\n        dry_run: bool,\n    ) -\u003e Self {\n        Self { processor, debounce_ms, output_path, dry_run }\n    }\n\n    /// Run forever (normal CLI use).\n    pub fn run(\u0026self, root: \u0026Path) -\u003e anyhow::Result\u003c()\u003e {\n        self.run_until_stopped(root, None)\n    }\n\n    /// Run until `stop` is set to true (useful for tests).\n    /// The loop checks the flag every 100 ms when idle.\n    pub fn run_until_stopped(\n        \u0026self,\n        root: \u0026Path,\n        stop: Option\u003cArc\u003cAtomicBool\u003e\u003e,\n    ) -\u003e anyhow::Result\u003c()\u003e {\n        println!(\n            \"{} Watching {} for changes… (Ctrl-C to stop)\",\n            \"bark\".green().bold(),\n            root.display()\n        );\n\n        let (tx, rx) = std::sync::mpsc::channel::\u003cnotify::Result\u003cEvent\u003e\u003e();\n\n        let mut watcher = RecommendedWatcher::new(\n            move |event: notify::Result\u003cEvent\u003e| {\n                tx.send(event).ok();\n            },\n            notify::Config::default(),\n        )?;\n\n        watcher.watch(root, RecursiveMode::Recursive)?;\n\n        // Track files bark itself just wrote so we don't re-process them\n        let recently_written: Arc\u003cMutex\u003cHashSet\u003cPathBuf\u003e\u003e\u003e =\n            Arc::new(Mutex::new(HashSet::new()));\n\n        loop {\n            // Check stop flag first\n            if stop.as_ref().map_or(false, |s| s.load(Ordering::Relaxed)) {\n                break;\n            }\n\n            // Wait for an event with a short timeout so we can poll the stop flag\n            let first_event = match rx.recv_timeout(Duration::from_millis(100)) {\n                Ok(Ok(e)) =\u003e e,\n                Ok(Err(_)) =\u003e continue,\n                Err(std::sync::mpsc::RecvTimeoutError::Timeout) =\u003e continue,\n                Err(std::sync::mpsc::RecvTimeoutError::Disconnected) =\u003e break,\n            };\n\n            // Collect additional events within the debounce window\n            let deadline = Instant::now() + Duration::from_millis(self.debounce_ms);\n            let mut events = vec![first_event];\n\n            loop {\n                let remaining = deadline.saturating_duration_since(Instant::now());\n                if remaining.is_zero() {\n                    break;\n                }\n                match rx.recv_timeout(remaining) {\n                    Ok(Ok(e)) =\u003e events.push(e),\n                    _ =\u003e break,\n                }\n            }\n\n            // Collect paths that need processing\n            let mut paths: HashSet\u003cPathBuf\u003e = HashSet::new();\n            for event in \u0026events {\n                if is_write_event(\u0026event.kind) {\n                    for p in \u0026event.paths {\n                        if p.is_file() {\n                            let canon = p.canonicalize().unwrap_or_else(|_| p.clone());\n                            paths.insert(canon);\n                        }\n                    }\n                }\n            }\n\n            if paths.is_empty() {\n                continue;\n            }\n\n            // Filter out files we just wrote\n            let paths: Vec\u003cPathBuf\u003e = {\n                let mut rw = recently_written.lock().unwrap();\n                paths\n                    .into_iter()\n                    .filter(|p| !rw.remove(p))\n                    .collect()\n            };\n\n            if paths.is_empty() {\n                continue;\n            }\n\n            let mut processed = 0usize;\n            for path in \u0026paths {\n                if self.dry_run {\n                    println!(\"{} {}\", \"would tag\".purple(), path.display());\n                    processed += 1;\n                    continue;\n                }\n                // Mark as recently written before we write\n                {\n                    recently_written.lock().unwrap().insert(path.clone());\n                }\n                match self.processor.tag_file_by_path(path, root) {\n                    Ok(_) =\u003e processed += 1,\n                    Err(e) =\u003e {\n                        eprintln!(\"{} {}: {}\", \"error\".red(), path.display(), e);\n                        // Remove from set since we didn't actually write it\n                        recently_written.lock().unwrap().remove(path);\n                    }\n                }\n            }\n\n            // Regenerate tree if any files were processed\n            if processed \u003e 0 \u0026\u0026 !self.dry_run {\n                let backup_dir = self.processor.backup_mgr.backup_dir.clone();\n                let gen = TreeGenerator::new(root, \u0026backup_dir, \u0026self.output_path);\n                if let Err(e) = gen.generate(\u0026self.output_path) {\n                    eprintln!(\"{} regenerating tree: {}\", \"warn\".yellow(), e);\n                }\n                println!(\n                    \"{} processed {} file(s)\",\n                    \"bark\".green().bold(),\n                    processed\n                );\n            }\n\n            // Check stop after processing a batch\n            if stop.as_ref().map_or(false, |s| s.load(Ordering::Relaxed)) {\n                break;\n            }\n        }\n\n        Ok(())\n    }\n}\n\nfn is_write_event(kind: \u0026EventKind) -\u003e bool {\n    matches!(\n        kind,\n        EventKind::Create(_) | EventKind::Modify(notify::event::ModifyKind::Data(_))\n    )\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use notify::event::{CreateKind, DataChange, MetadataKind, ModifyKind, RemoveKind};\n\n    #[test]\n    fn is_write_event_create_is_true() {\n        assert!(is_write_event(\u0026EventKind::Create(CreateKind::File)));\n        assert!(is_write_event(\u0026EventKind::Create(CreateKind::Any)));\n    }\n\n    #[test]\n    fn is_write_event_modify_data_is_true() {\n        assert!(is_write_event(\u0026EventKind::Modify(ModifyKind::Data(DataChange::Content))));\n        assert!(is_write_event(\u0026EventKind::Modify(ModifyKind::Data(DataChange::Any))));\n    }\n\n    #[test]\n    fn is_write_event_remove_is_false() {\n        assert!(!is_write_event(\u0026EventKind::Remove(RemoveKind::File)));\n    }\n\n    #[test]\n    fn is_write_event_other_modify_is_false() {\n        assert!(!is_write_event(\u0026EventKind::Modify(ModifyKind::Metadata(\n            MetadataKind::Any\n        ))));\n    }\n\n    #[test]\n    fn file_watcher_new() {\n        use crate::config::Config;\n        use crate::processor::Processor;\n        use std::sync::Arc;\n\n        let config = Arc::new(Config::default());\n        let tmp = tempfile::TempDir::new().unwrap();\n        let proc = Arc::new(Processor::new(\n            config,\n            tmp.path(),\n            tmp.path().join(\".bark_backups\"),\n            false,\n            false,\n            false,\n            None,\n        ));\n        let fw = FileWatcher::new(\n            proc,\n            500,\n            tmp.path().join(\"tree.txt\"),\n            false,\n        );\n        assert_eq!(fw.debounce_ms, 500);\n        assert!(!fw.dry_run);\n    }\n}\n","traces":[{"line":20,"address":[6999232],"length":1,"stats":{"Line":2}},{"line":30,"address":[6999328],"length":1,"stats":{"Line":1}},{"line":31,"address":[7200978],"length":1,"stats":{"Line":1}},{"line":36,"address":[6922676,6917677,6914560],"length":1,"stats":{"Line":1}},{"line":41         var previousData = {"files":[{"path":["/","home","logan","bark","src","backup.rs"],"content":"// File: src/backup.rs\nuse anyhow::{Context, Result};\nuse chrono::{DateTime, Local, TimeZone};\nuse std::io::Write;\nuse std::path::{Path, PathBuf};\nuse tempfile::NamedTempFile;\n\npub struct BackupManager {\n    pub backup_dir: PathBuf,\n    pub enabled: bool,\n}\n\npub struct BackupEntry {\n    pub original: PathBuf,\n    pub backup_path: PathBuf,\n    pub timestamp: DateTime\u003cLocal\u003e,\n}\n\nimpl BackupManager {\n    pub fn new(backup_dir: PathBuf, enabled: bool) -\u003e Self {\n        Self { backup_dir, enabled }\n    }\n\n    /// Create a timestamped backup of `file` before it is modified.\n    pub fn backup(\u0026self, file: \u0026Path, root: \u0026Path) -\u003e Result\u003cOption\u003cPathBuf\u003e\u003e {\n        if !self.enabled {\n            return Ok(None);\n        }\n        let rel = file.strip_prefix(root).unwrap_or(file);\n        let ts = Local::now().format(\"%Y%m%d_%H%M%S\").to_string();\n        // Preserve directory structure inside backup_dir\n        let backup_path = self.backup_dir.join(format!(\n            \"{}.{}.bak\",\n            rel.to_string_lossy().replace('\\\\', \"/\"),\n            ts\n        ));\n\n        if let Some(parent) = backup_path.parent() {\n            std::fs::create_dir_all(parent)\n                .with_context(|| format!(\"creating backup dir: {}\", parent.display()))?;\n        }\n        std::fs::copy(file, \u0026backup_path)\n            .with_context(|| format!(\"backing up: {}\", file.display()))?;\n        Ok(Some(backup_path))\n    }\n\n    /// Atomically write `content` to `target`.\n    /// Creates the tempfile in the same directory as the target so the\n    /// rename (persist) is guaranteed to be on the same filesystem.\n    pub fn write_atomic(target: \u0026Path, content: \u0026str) -\u003e Result\u003c()\u003e {\n        let parent = target\n            .parent()\n            .with_context(|| format!(\"no parent for: {}\", target.display()))?;\n\n        // Capture original permissions if the file already exists\n        let original_perms = if target.exists() {\n            Some(std::fs::metadata(target)?.permissions())\n        } else {\n            None\n        };\n\n        let mut tmp = NamedTempFile::new_in(parent)\n            .with_context(|| format!(\"creating tempfile near: {}\", target.display()))?;\n        tmp.write_all(content.as_bytes())\n            .with_context(|| \"writing to tempfile\")?;\n        tmp.flush()?;\n\n        // Restore permissions before rename\n        if let Some(perms) = original_perms {\n            std::fs::set_permissions(tmp.path(), perms)?;\n        }\n\n        tmp.persist(target)\n            .with_context(|| format!(\"persisting to: {}\", target.display()))?;\n        Ok(())\n    }\n\n    /// List all backup entries in the backup directory.\n    pub fn list_backups(\u0026self, filter_file: Option\u003c\u0026Path\u003e, root: \u0026Path) -\u003e Result\u003cVec\u003cBackupEntry\u003e\u003e {\n        if !self.backup_dir.exists() {\n            return Ok(vec![]);\n        }\n\n        let filter_rel = filter_file\n            .and_then(|f| f.strip_prefix(root).ok().or(Some(f)))\n            .map(|p| p.to_string_lossy().replace('\\\\', \"/\"));\n\n        let mut entries = vec![];\n        self.collect_backups(\u0026self.backup_dir, \u0026mut entries, \u0026filter_rel)?;\n        entries.sort_by(|a, b| b.timestamp.cmp(\u0026a.timestamp));\n        Ok(entries)\n    }\n\n    fn collect_backups(\n        \u0026self,\n        dir: \u0026Path,\n        out: \u0026mut Vec\u003cBackupEntry\u003e,\n        filter: \u0026Option\u003cString\u003e,\n    ) -\u003e Result\u003c()\u003e {\n        for entry in std::fs::read_dir(dir)? {\n            let entry = entry?;\n            let path = entry.path();\n            if path.is_dir() {\n                self.collect_backups(\u0026path, out, filter)?;\n            } else if let Some(name) = path.file_name().and_then(|n| n.to_str()) {\n                if !name.ends_with(\".bak\") {\n                    continue;\n                }\n                // Parse: \u003crel_path\u003e.\u003cYYYYMMDD_HHMMSS\u003e.bak\n                if let Some(be) = parse_backup_entry(\u0026path, \u0026self.backup_dir) {\n                    if let Some(ref f) = filter {\n                        let orig = be.original.to_string_lossy().replace('\\\\', \"/\");\n                        if !orig.contains(f.as_str()) {\n                            continue;\n                        }\n                    }\n                    out.push(be);\n                }\n            }\n        }\n        Ok(())\n    }\n\n    pub fn restore(\u0026self, entry: \u0026BackupEntry, dry_run: bool) -\u003e Result\u003c()\u003e {\n        if dry_run {\n            println!(\"  would restore: {} ← {}\", entry.original.display(), entry.backup_path.display());\n            return Ok(());\n        }\n        if let Some(parent) = entry.original.parent() {\n            std::fs::create_dir_all(parent)?;\n        }\n        std::fs::copy(\u0026entry.backup_path, \u0026entry.original)\n            .with_context(|| format!(\"restoring: {}\", entry.original.display()))?;\n        Ok(())\n    }\n}\n\nfn parse_backup_entry(backup_path: \u0026Path, backup_dir: \u0026Path) -\u003e Option\u003cBackupEntry\u003e {\n    let rel_to_dir = backup_path.strip_prefix(backup_dir).ok()?;\n    let name = rel_to_dir.to_string_lossy();\n    // Remove .bak\n    let without_bak = name.strip_suffix(\".bak\")?;\n    // The timestamp is the last 15 chars: YYYYMMDD_HHMMSS\n    if without_bak.len() \u003c 16 {\n        return None;\n    }\n    let (orig_part, ts_part) = without_bak.split_at(without_bak.len() - 15 - 1);\n    // ts_part starts with '.'\n    let ts_str = ts_part.strip_prefix('.')?;\n    let naive = chrono::NaiveDateTime::parse_from_str(ts_str, \"%Y%m%d_%H%M%S\").ok()?;\n    // The filename timestamp is written in local time, so interpret it as local, not UTC.\n    let timestamp: DateTime\u003cLocal\u003e = chrono::Local.from_local_datetime(\u0026naive).single()\n        .unwrap_or_else(|| Local::now());\n\n    Some(BackupEntry {\n        original: PathBuf::from(orig_part),\n        backup_path: backup_path.to_path_buf(),\n        timestamp,\n    })\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn parse_backup_entry_valid() {\n        let tmp = tempfile::TempDir::new().unwrap();\n        let backup_dir = tmp.path().to_path_buf();\n\n        // Create a fake backup file with the expected naming convention\n        let fake_backup = backup_dir.join(\"src/main.rs.20260319_142022.bak\");\n        std::fs::create_dir_all(fake_backup.parent().unwrap()).unwrap();\n        std::fs::write(\u0026fake_backup, \"content\").unwrap();\n\n        let entry = parse_backup_entry(\u0026fake_backup, \u0026backup_dir);\n        assert!(entry.is_some(), \"should parse a valid backup filename\");\n        let e = entry.unwrap();\n        assert_eq!(e.original, PathBuf::from(\"src/main.rs\"));\n    }\n\n    #[test]\n    fn parse_backup_entry_invalid() {\n        let tmp = tempfile::TempDir::new().unwrap();\n        let bad = tmp.path().join(\"not_a_backup.txt\");\n        std::fs::write(\u0026bad, \"x\").unwrap();\n        assert!(parse_backup_entry(\u0026bad, tmp.path()).is_none());\n    }\n\n    #[test]\n    fn write_atomic_creates_file() {\n        let tmp = tempfile::TempDir::new().unwrap();\n        let target = tmp.path().join(\"output.txt\");\n        BackupManager::write_atomic(\u0026target, \"hello bark\\n\").unwrap();\n        let content = std::fs::read_to_string(\u0026target).unwrap();\n        assert_eq!(content, \"hello bark\\n\");\n    }\n\n    #[test]\n    fn write_atomic_overwrites_existing() {\n        let tmp = tempfile::TempDir::new().unwrap();\n        let target = tmp.path().join(\"output.txt\");\n        std::fs::write(\u0026target, \"old content\\n\").unwrap();\n        BackupManager::write_atomic(\u0026target, \"new content\\n\").unwrap();\n        let content = std::fs::read_to_string(\u0026target).unwrap();\n        assert_eq!(content, \"new content\\n\");\n    }\n\n    #[test]\n    fn list_backups_filter_by_file() {\n        let tmp = tempfile::TempDir::new().unwrap();\n        let root = tmp.path().to_path_buf();\n        let backup_dir = root.join(\".bark_backups\");\n\n        // Create two fake backup files\n        std::fs::create_dir_all(\u0026backup_dir).unwrap();\n        std::fs::write(\n            backup_dir.join(\"src/main.rs.20260319_120000.bak\"),\n            \"main content\",\n        ).unwrap_or_else(|_| {\n            std::fs::create_dir_all(backup_dir.join(\"src\")).unwrap();\n            std::fs::write(backup_dir.join(\"src/main.rs.20260319_120000.bak\"), \"main content\").unwrap();\n        });\n        std::fs::create_dir_all(backup_dir.join(\"src\")).unwrap();\n        std::fs::write(backup_dir.join(\"src/main.rs.20260319_120000.bak\"), \"main content\").unwrap();\n        std::fs::write(backup_dir.join(\"lib.rs.20260319_120001.bak\"), \"lib content\").unwrap();\n\n        let mgr = BackupManager::new(backup_dir, false);\n        let all = mgr.list_backups(None, \u0026root).unwrap();\n        assert_eq!(all.len(), 2, \"should find both backups\");\n\n        let filtered = mgr.list_backups(Some(std::path::Path::new(\"main.rs\")), \u0026root).unwrap();\n        assert_eq!(filtered.len(), 1, \"filter should find only main.rs backup\");\n    }\n\n    #[test]\n    fn restore_copies_file() {\n        let tmp = tempfile::TempDir::new().unwrap();\n        let backup_dir = tmp.path().join(\".bark_backups\");\n        std::fs::create_dir_all(\u0026backup_dir).unwrap();\n\n        let bak = backup_dir.join(\"out.rs.20260319_120000.bak\");\n        std::fs::write(\u0026bak, \"backup content\\n\").unwrap();\n        let dest = tmp.path().join(\"out.rs\");\n\n        // Build a BackupEntry with an *absolute* original path so restore() writes to the right place\n        let entry = BackupEntry {\n            original: dest.clone(),\n            backup_path: bak,\n            timestamp: chrono::Local::now(),\n        };\n\n        let mgr = BackupManager::new(backup_dir, false);\n        mgr.restore(\u0026entry, false).unwrap();\n\n        assert!(dest.exists(), \"restored file should exist\");\n        assert_eq!(std::fs::read_to_string(\u0026dest).unwrap(), \"backup content\\n\");\n    }\n\n    #[test]\n    fn restore_creates_parent_dirs() {\n        let tmp = tempfile::TempDir::new().unwrap();\n        let backup_dir = tmp.path().join(\".bark_backups\");\n        std::fs::create_dir_all(\u0026backup_dir).unwrap();\n\n        let bak = backup_dir.join(\"source.rs.20260319_120000.bak\");\n        std::fs::write(\u0026bak, \"content\\n\").unwrap();\n        // Destination in a subdirectory that doesn't yet exist\n        let dest = tmp.path().join(\"nested\").join(\"dir\").join(\"source.rs\");\n\n        let entry = BackupEntry {\n            original: dest.clone(),\n            backup_path: bak,\n            timestamp: chrono::Local::now(),\n        };\n\n        let mgr = BackupManager::new(backup_dir, false);\n        mgr.restore(\u0026entry, false).unwrap();\n        assert!(dest.exists());\n    }\n\n    #[test]\n    fn parse_backup_entry_too_short() {\n        let tmp = tempfile::TempDir::new().unwrap();\n        // Filename ends in .bak but the stem is too short to contain a timestamp\n        let bad = tmp.path().join(\"a.bak\");\n        std::fs::write(\u0026bad, \"x\").unwrap();\n        assert!(parse_backup_entry(\u0026bad, tmp.path()).is_none());\n    }\n\n    #[test]\n    fn backup_disabled_returns_none() {\n        let tmp = tempfile::TempDir::new().unwrap();\n        let source = tmp.path().join(\"main.rs\");\n        std::fs::write(\u0026source, \"content\").unwrap();\n\n        let mgr = BackupManager::new(tmp.path().join(\".bark_backups\"), false);\n        let result = mgr.backup(\u0026source, tmp.path()).unwrap();\n        assert!(result.is_none(), \"disabled backup should return None\");\n    }\n\n    #[test]\n    fn backup_creates_file_in_backup_dir() {\n        let tmp = tempfile::TempDir::new().unwrap();\n        let root = tmp.path().to_path_buf();\n        let source = root.join(\"src/main.rs\");\n        std::fs::create_dir_all(source.parent().unwrap()).unwrap();\n        std::fs::write(\u0026source, \"original content\\n\").unwrap();\n\n        let backup_dir = root.join(\".bark_backups\");\n        let mgr = BackupManager::new(backup_dir.clone(), true);\n        let result = mgr.backup(\u0026source, \u0026root).unwrap();\n\n        assert!(result.is_some());\n        let backup_path = result.unwrap();\n        assert!(backup_path.exists());\n        let content = std::fs::read_to_string(\u0026backup_path).unwrap();\n        assert_eq!(content, \"original content\\n\");\n    }\n}\n","traces":[{"line":20,"address":[7343024],"length":1,"stats":{"Line":6}},{"line":25,"address":[7343072,7344920,7344926],"length":1,"stats":{"Line":3}},{"line":26,"address":[6885575],"length":1,"stats":{"Line":3}},{"line":27,"address":[6885589],"length":1,"stats":{"Line":2}},{"line":29,"address":[6885679],"length":1,"stats":{"Line":3}},{"line":30,"address":[6885757,6885870],"length":1,"stats":{"Line":2}},{"line":32,"address":[6886106,6885985,6886211],"length":1,"stats":{"Line":4}},{"line":34,"address":[6886064,6886166],"length":1,"stats":{"Line":5}},{"line":38,"address":[6886611,6886540],"length":1,"stats":{"Line":4}},{"line":39,"address":[6886831,6886731,6886919],"length":1,"stats":{"Line":4}},{"line":40,"address":[6886810,6886903],"length":1,"stats":{"Line":2}},{"line":42,"address":[7344618,7344363,7344701,7344896],"length":1,"stats":{"Line":4}},{"line":43,"address":[7141621,7141568],"length":1,"stats":{"Line":2}},{"line":44,"address":[6930114],"length":1,"stats":{"Line":2}},{"line":50,"address":[692 ":{"Line":2}},{"line":156,"address":[6889317],"length":1,"stats":{"Line":2}},{"line":157,"address":[6889211],"length":1,"stats":{"Line":2}},{"line":158,"address":[6889246],"length":1,"stats":{"Line":2}}],"covered":75,"coverable":75},{"path":["/","home","logan","bark","src","cli.rs"],"content":"// File: src/cli.rs\nuse clap::{Args, Parser, Subcommand};\nuse std::path::PathBuf;\n\n#[derive(Parser, Debug)]\n#[command(\n    name = \"bark\",\n    version,\n    about = \"bark — smart file header management and directory tree generator\",\n    long_about = \"bark stamps standardized headers onto source files and generates a directory tree.\\nRun `bark` in any project directory to get started.\"\n)]\npub struct Cli {\n    #[command(subcommand)]\n    pub command: Option\u003cCommands\u003e,\n\n    /// Show detailed processing information\n    #[arg(short, long, global = true)]\n    pub verbose: bool,\n\n    /// Path to config file (default: searches upward for .bark.toml)\n    #[arg(long, global = true, value_name = \"FILE\")]\n    pub config: Option\u003cPathBuf\u003e,\n}\n\n#[derive(Subcommand, Debug)]\npub enum Commands {\n    /// Add or update file path headers [default when no subcommand given]\n    Tag(TagArgs),\n    /// Remove all bark-managed headers from files\n    Strip(StripArgs),\n    /// Generate the directory tree only — no headers are added or modified\n    Tree(TreeArgs),\n    /// Watch directory and auto-tag files on change\n    Watch(WatchArgs),\n    /// Restore files from a backup\n    Restore(RestoreArgs),\n    /// Create a .bark.toml config file in the current directory\n    Init(InitArgs),\n}\n\n#[derive(Args, Debug)]\npub struct TagArgs {\n    /// Preview changes without modifying files\n    #[arg(short = 'n', long)]\n    pub dry_run: bool,\n\n    /// Skip creating backups before modifying files\n    #[arg(short, long)]\n    pub force: bool,\n\n    /// Output file for the generated directory tree\n    #[arg(short, long, default_value = \"tree.txt\", value_name = \"FILE\")]\n    pub output: PathBuf,\n\n    /// Directory to store backups\n    #[arg(short, long, default_value = \".bark_backups\", value_name = \"DIR\")]\n    pub backup_dir: PathBuf,\n\n    /// Root directory to process (default: current directory)\n    #[arg(value_name = \"DIR\")]\n    pub root: Option\u003cPathBuf\u003e,\n\n    /// Override header template for this run (e.g. \"File: {{file}} | Author: {{author}}\")\n    #[arg(long, value_name = \"TEMPLATE\")]\n    pub template: Option\u003cString\u003e,\n\n    /// Maximum file size to process in bytes\n    #[arg(long, value_name = \"BYTES\")]\n    pub max_size: Option\u003cu64\u003e,\n\n    /// Number of parallel threads (0 = automatic)\n    #[arg(long, default_value = \"0\", value_name = \"N\")]\n    pub threads: usize,\n\n    /// Skip generating tree.txt\n    #[arg(long)]\n    pub no_tree: bool,\n}\n\nimpl Default for TagArgs {\n    fn default() -\u003e Self {\n        Self {\n            dry_run: false,\n            force: false,\n            output: PathBuf::from(\"tree.txt\"),\n            backup_dir: PathBuf::from(\".bark_backups\"),\n            root: None,\n            template: None,\n            max_size: None,\n            threads: 0,\n            no_tree: false,\n        }\n    }\n}\n\n#[derive(Args, Debug)]\npub struct StripArgs {\n    /// Preview which headers would be removed without modifying files\n    #[arg(short = 'n', long)]\n    pub dry_run: bool,\n\n    /// Root directory to process (default: current directory)\n    #[arg(value_name = \"DIR\")]\n    pub root: Option\u003cPathBuf\u003e,\n\n    /// Create backups before stripping\n    #[arg(short, long)]\n    pub backup: bool,\n\n    /// Backup directory (used with --backup)\n    #[arg(long, default_value = \".bark_backups\", value_name = \"DIR\")]\n    pub backup_dir: PathBuf,\n}\n\n#[derive(Args, Debug)]\npub struct WatchArgs {\n    /// Root directory to watch (default: current directory)\n    #[arg(value_name = \"DIR\")]\n    pub root: Option\u003cPathBuf\u003e,\n\n    /// Debounce delay in milliseconds before processing changes\n    #[arg(long, default_value = \"500\", value_name = \"MS\")]\n    pub debounce: u64,\n\n    /// Log what would change without writing files\n    #[arg(short = 'n', long)]\n    pub dry_run: bool,\n\n    /// Output file for tree regeneration on change\n    #[arg(short, long, default_value = \"tree.txt\", value_name = \"FILE\")]\n    pub output: PathBuf,\n}\n\n#[derive(Args, Debug)]\npub struct RestoreArgs {\n    /// Root directory of the project (default: current directory)\n    #[arg(long, value_name = \"DIR\")]\n    pub root: Option\u003cPathBuf\u003e,\n\n    /// Backup directory to restore from\n    #[arg(long, default_value = \".bark_backups\", value_name = \"DIR\")]\n    pub backup_dir: PathBuf,\n\n    /// Restore only backups for this specific file\n    #[arg(long, value_name = \"FILE\")]\n    pub file: Option\u003cPathBuf\u003e,\n\n    /// Preview what would be restored without writing\n    #[arg(short = 'n', long)]\n    pub dry_run: bool,\n\n    /// Automatically restore the most recent backup of each file\n    #[arg(long)]\n    pub latest: bool,\n}\n\n#[derive(Args, Debug)]\npub struct TreeArgs {\n    /// Root directory to scan (default: current directory)\n    #[arg(value_name = \"DIR\")]\n    pub root: Option\u003cPathBuf\u003e,\n\n    /// Output file for the generated directory tree\n    #[arg(short, long, default_value = \"tree.txt\", value_name = \"FILE\")]\n    pub output: PathBuf,\n}\n\n#[derive(Args, Debug)]\npub struct InitArgs {\n    /// Directory to create .bark.toml in (default: current directory)\n    #[arg(value_name = \"DIR\")]\n    pub dir: Option\u003cPathBuf\u003e,\n\n    /// Overwrite existing .bark.toml if present\n    #[arg(long)]\n    pub force: bool,\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","logan","bark","src","config.rs"],"content":"// File: src/config.rs\nuse anyhow::{Context, Result};\nuse serde::Deserialize;\nuse std::collections::HashMap;\nuse std::path::{Path, PathBuf};\n\n#[derive(Debug, Deserialize, Clone)]\n#[allow(dead_code)]\npub struct Config {\n    #[serde(default)]\n    pub general: GeneralConfig,\n    #[serde(default)]\n    pub template: TemplateConfig,\n    #[serde(default)]\n    pub exclude: ExcludeConfig,\n    #[serde(default)]\n    pub extensions: ExtensionsConfig,\n    #[serde(default)]\n    pub watch: WatchConfig,  // used for .bark.toml deserialization\n}\n\nimpl Default for Config {\n    fn default() -\u003e Self {\n        Self {\n            general: GeneralConfig::default(),\n            template: TemplateConfig::default(),\n            exclude: ExcludeConfig::default(),\n            extensions: ExtensionsConfig::default(),\n            watch: WatchConfig::default(),\n        }\n    }\n}\n\n#[derive(Debug, Deserialize, Clone)]\npub struct GeneralConfig {\n    #[serde(default = \"default_output\")]\n    pub output: String,\n    #[serde(default = \"default_backup_dir\")]\n    pub backup_dir: String,\n    #[serde(default = \"default_max_file_size\")]\n    pub max_file_size: u64,\n    #[serde(default = \"default_true\")]\n    pub backup: bool,\n}\n\nfn default_output() -\u003e String { \"tree.txt\".into() }\nfn default_backup_dir() -\u003e String { \".bark_backups\".into() }\nfn default_max_file_size() -\u003e u64 { 1_048_576 }\nfn default_true() -\u003e bool { true }\n\nimpl Default for GeneralConfig {\n    fn default() -\u003e Self {\n        Self {\n            output: default_output(),\n            backup_dir: default_backup_dir(),\n            max_file_size: default_max_file_size(),\n            backup: true,\n        }\n    }\n}\n\n#[derive(Debug, Deserialize, Clone)]\npub struct TemplateConfig {\n    #[serde(default = \"default_template\")]\n    pub default: String,\n    #[serde(default = \"default_date_format\")]\n    pub date_format: String,\n    #[serde(default)]\n    pub variables: HashMap\u003cString, String\u003e,\n    #[serde(default)]\n    pub overrides: HashMap\u003cString, String\u003e,\n}\n\nfn default_template() -\u003e String { \"File: {{file}}\".into() }\nfn default_date_format() -\u003e String { \"%Y-%m-%d\".into() }\n\nimpl Default for TemplateConfig {\n    fn default() -\u003e Self {\n        Self {\n            default: default_template(),\n            date_format: default_date_format(),\n            variables: HashMap::new(),\n            overrides: HashMap::new(),\n        }\n    }\n}\n\n#[derive(Debug, Deserialize, Clone)]\npub struct ExcludeConfig {\n    #[serde(default = \"default_exclude_patterns\")]\n    pub patterns: Vec\u003cString\u003e,\n}\n\nfn default_exclude_patterns() -\u003e Vec\u003cString\u003e {\n    vec![\n        \"*.min.*\".into(),\n        \"*.bundle.*\".into(),\n        \"dist/**\".into(),\n        \"build/**\".into(),\n        \"node_modules/**\".into(),\n        \"vendor/**\".into(),\n        \"target/**\".into(),\n    ]\n}\n\nimpl Default for ExcludeConfig {\n    fn default() -\u003e Self {\n        Self { patterns: default_exclude_patterns() }\n    }\n}\n\n#[derive(Debug, Deserialize, Clone, Default)]\npub struct ExtensionsConfig {\n    #[serde(default)]\n    pub custom: Vec\u003cCustomExtension\u003e,\n    #[serde(default)]\n    pub skip: Vec\u003cString\u003e,\n}\n\n#[derive(Debug, Deserialize, Clone)]\npub struct CustomExtension {\n    pub ext: String,\n    pub style: String,\n}\n\n#[derive(Debug, Deserialize, Clone)]\n#[allow(dead_code)]\npub struct WatchConfig {\n    #[serde(default = \"default_debounce_ms\")]\n    pub debounce_ms: u64,\n    #[serde(default)]\n    pub ignore: Vec\u003cString\u003e,\n}\n\nfn default_debounce_ms() -\u003e u64 { 500 }\n\nimpl Default for WatchConfig {\n    fn default() -\u003e Self {\n        Self { debounce_ms: 500, ignore: Vec::new() }\n    }\n}\n\nimpl Config {\n    /// Walk upward from start_dir looking for .bark.toml, then check user config dir.\n    pub fn find_and_load(start_dir: \u0026Path) -\u003e Result\u003cOption\u003cSelf\u003e\u003e {\n        let mut current = start_dir.to_path_buf();\n        loop {\n            let candidate = current.join(\".bark.toml\");\n            if candidate.is_file() {\n                return Self::from_file(\u0026candidate).map(Some);\n            }\n            if !current.pop() {\n                break;\n            }\n        }\n        if let Some(home) = home_dir() {\n            let user_cfg = home.join(\".config\").join(\"bark\").join(\"config.toml\");\n            if user_cfg.is_file() {\n                return Self::from_file(\u0026user_cfg).map(Some);\n            }\n        }\n        Ok(None)\n    }\n\n    pub fn from_file(path: \u0026Path) -\u003e Result\u003cSelf\u003e {\n        let content = std::fs::read_to_string(path)\n            .with_context(|| format!(\"reading config: {}\", path.display()))?;\n        toml::from_str(\u0026content)\n            .with_context(|| format!(\"parsing config: {}\", path.display()))\n    }\n}\n\npub fn home_dir() -\u003e Option\u003cPathBuf\u003e {\n    std::env::var(\"HOME\")\n        .ok()\n        .or_else(|| std::env::var(\"USERPROFILE\").ok())\n        .map(PathBuf::from)\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn config_defaults() {\n        let c = Config::default();\n        assert_eq!(c.general.output, \"tree.txt\");\n        assert_eq!(c.general.backup_dir, \".bark_backups\");\n        assert_eq!(c.general.max_file_size, 1_048_576);\n        assert!(c.general.backup);\n        assert_eq!(c.template.default, \"File: {{file}}\");\n        assert_eq!(c.template.date_format, \"%Y-%m-%d\");\n        assert!(!c.exclude.patterns.is_empty());\n    }\n\n    #[test]\n    fn config_from_minimal_toml() {\n        let toml = r#\"\n[general]\noutput = \"my_tree.txt\"\n\"#;\n        let tmp = tempfile::NamedTempFile::new().unwrap();\n        std::fs::write(tmp.path(), toml).unwrap();\n        let c = Config::from_file(tmp.path()).unwrap();\n        assert_eq!(c.general.output, \"my_tree.txt\");\n        // Everything else falls back to defaults\n        assert_eq!(c.general.backup_dir, \".bark_backups\");\n        assert_eq!(c.template.default, \"File: {{file}}\");\n    }\n\n    #[test]\n    fn config_template_override() {\n        let toml = r#\"\n[template]\ndefault = \"File: {{file}} | Author: {{author}}\"\n\"#;\n        let tmp = tempfile::NamedTempFile::new().unwrap();\n        std::fs::write(tmp.path(), toml).unwrap();\n        let c = Config::from_file(tmp.path()).unwrap();\n        assert_eq!(c.template.default, \"File: {{file}} | Author: {{author}}\");\n    }\n\n    #[test]\n    fn config_custom_variables() {\n        let toml = r#\"\n[template.variables]\nauthor = \"Bob\"\nteam = \"backend\"\n\"#;\n        let tmp = tempfile::NamedTempFile::new().unwrap();\n        std::fs::write(tmp.path(), toml).unwrap();\n        let c = Config::from_file(tmp.path()).unwrap();\n        assert_eq!(c.template.variables.get(\"author\").map(|s| s.as_str()), Some(\"Bob\"));\n        assert_eq!(c.template.variables.get(\"team\").map(|s| s.as_str()), Some(\"backend\"));\n    }\n\n    #[test]\n    fn config_invalid_toml_errors() {\n        let tmp = tempfile::NamedTempFile::new().unwrap();\n        std::fs::write(tmp.path(), \"not valid toml :::\").unwrap();\n        assert!(Config::from_file(tmp.path()).is_err());\n    }\n\n    #[test]\n    fn config_find_and_load_no_config_file() {\n        // A temp dir with no .bark.toml — find_and_load should walk up, check home, return None\n        // (assumes no .bark.toml in /tmp ancestry and no ~/.config/bark/config.toml)\n        let dir = tempfile::TempDir::new().unwrap();\n        // Just verify it doesn't panic; result might be None or Some if user config exists\n        let result = Config::find_and_load(dir.path());\n        assert!(result.is_ok(), \"find_and_load should not error\");\n    }\n\n    #[test]\n    fn home_dir_returns_some_on_unix() {\n        // On Linux/macOS, HOME should ats":{"Line":5}},{"line":169,"address":[7250037,7249984],"length":1,"stats":{"Line":5}},{"line":173,"address":[6985888],"length":1,"stats":{"Line":1}},{"line":174,"address":[6985902],"length":1,"stats":{"Line":1}},{"line":176,"address":[6701104,6701117],"length":1,"stats":{"Line":1}},{"line":177,"address":[6985962],"length":1,"stats":{"Line":1}}],"covered":53,"coverable":56},{"path":["/","home","logan","bark","src","header.rs"],"content":"// File: src/header.rs\nuse crate::template::TemplateContext;\nuse regex::Regex;\n\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\npub enum CommentStyle {\n    Slash,  // // comment\n    Hash,   // # comment\n    Css,    // /* comment */\n    Html,   // \u003c!-- comment --\u003e\n}\n\nimpl CommentStyle {\n    pub fn from_ext(ext: \u0026str) -\u003e Option\u003cSelf\u003e {\n        match ext {\n            // C-family, JVM, systems, modern compiled\n            \"go\" | \"rs\" | \"js\" | \"mjs\" | \"cjs\"\n            | \"ts\" | \"tsx\" | \"jsx\" | \"mts\" | \"cts\"\n            | \"java\" | \"kt\" | \"kts\" | \"scala\" | \"groovy\"\n            | \"cpp\" | \"cc\" | \"cxx\" | \"c\" | \"h\" | \"hpp\" | \"hxx\"\n            | \"cs\" | \"swift\" | \"m\" | \"mm\"\n            | \"dart\" | \"php\"\n            // Systems / low-level\n            | \"zig\" | \"v\" | \"odin\" | \"gleam\"\n            // Web / shader\n            | \"wgsl\" | \"glsl\" | \"hlsl\"\n            // Other compiled\n            | \"sol\" | \"proto\" | \"thrift\"\n            | \"fs\" | \"fsi\" | \"fsx\"    // F#\n            | \"purs\" | \"elm\"           // functional\n            =\u003e Some(Self::Slash),\n\n            // Config / data / scripting languages (non-shell)\n            \"py\" | \"rb\" | \"cr\" | \"nim\"\n            | \"ex\" | \"exs\"             // Elixir\n            | \"jl\"                     // Julia\n            | \"tf\" | \"tfvars\" | \"hcl\"  // Terraform / HCL\n            | \"nix\"                    // Nix\n            | \"graphql\" | \"gql\"\n            | \"md\" | \"txt\"\n            | \"toml\" | \"yaml\" | \"yml\"\n            =\u003e Some(Self::Hash),\n\n            \"css\" | \"scss\" | \"sass\" | \"less\" | \"styl\" =\u003e Some(Self::Css),\n\n            \"html\" | \"htm\" | \"xml\" | \"svg\"\n            | \"vue\" | \"svelte\" | \"astro\"\n            =\u003e Some(Self::Html),\n\n            _ =\u003e None,\n        }\n    }\n\n    /// Wrap a rendered template body in this comment style.\n    pub fn wrap(\u0026self, body: \u0026str) -\u003e String {\n        match self {\n            Self::Slash =\u003e format!(\"// {}\", body),\n            Self::Hash  =\u003e format!(\"# {}\", body),\n            Self::Css   =\u003e format!(\"/* {} */\", body),\n            Self::Html  =\u003e format!(\"\u003c!-- {} --\u003e\", body),\n        }\n    }\n\n    /// Regex that broadly matches ANY bark header for this comment style.\n    /// Intentionally broad so it catches headers written with any template.\n    pub fn detect_regex(\u0026self) -\u003e Regex {\n        let pattern = match self {\n            Self::Slash =\u003e r\"^[[:space:]]*//[[:space:]]+\\S\",\n            Self::Hash  =\u003e r\"^[[:space:]]*#[[:space:]]+\\S\",\n            Self::Css   =\u003e r\"^[[:space:]]*/\\*[[:space:]]+\\S\",\n            Self::Html  =\u003e r\"^[[:space:]]*\u003c!--[[:space:]]+\\S\",\n        };\n        Regex::new(pattern).expect(\"valid regex\")\n    }\n}\n\npub enum HeaderAction {\n    AlreadyCurrent,\n    UpdateExisting,\n    AddNew,\n}\n\n/// Build the full header line for a file.\npub fn build_header(style: CommentStyle, template: \u0026str, ctx: \u0026TemplateContext) -\u003e String {\n    let body = crate::template::render(template, ctx);\n    style.wrap(\u0026body)\n}\n\n/// Determine what action should be taken on a file's header.\npub fn analyze(content: \u0026str, desired_header: \u0026str, style: CommentStyle) -\u003e HeaderAction {\n    let re = style.detect_regex();\n    let candidate = candidate_line(content);\n    match candidate {\n        Some(line) if re.is_match(line) =\u003e {\n            if line.trim() == desired_header.trim() {\n                HeaderAction::AlreadyCurrent\n            } else {\n                HeaderAction::UpdateExisting\n            }\n        }\n        _ =\u003e HeaderAction::AddNew,\n    }\n}\n\n/// Return the line to inspect for an existing header.\n/// Skips shebangs so the header candidate is always line 0 or 1.\nfn candidate_line(content: \u0026str) -\u003e Option\u003c\u0026str\u003e {\n    let mut lines = content.lines();\n    let first = lines.next()?;\n    if first.starts_with(\"#!\") {\n        lines.next()\n    } else {\n        Some(first)\n    }\n}\n\n/// Apply the header tag — return new file content with header added/updated.\npub fn apply_tag(content: \u0026str, desired_header: \u0026str, style: CommentStyle) -\u003e String {\n    let re = style.detect_regex();\n    let line_ending = if content.contains(\"\\r\\n\") { \"\\r\\n\" } else { \"\\n\" };\n    let trailing_nl = content.ends_with('\\n') || content.ends_with(\"\\r\\n\");\n\n    let lines: Vec\u003c\u0026str\u003e = content.lines().collect();\n\n    if lines.is_empty() {\n        return format!(\"{}{}\", desired_header, line_ending);\n    }\n\n    let has_shebang = lines[0].starts_with(\"#!\");\n\n    let mut out: Vec\u003cString\u003e = Vec::new();\n\n    if has_shebang {\n        out.push(lines[0].to_string());\n        // Check whether line 1 is an existing header\n        let header_idx = if lines.len() \u003e 1 \u0026\u0026 re.is_match(lines[1]) { 1 } else { usize::MAX };\n        let mut rest_start = if header_idx == 1 {\n            if lines.get(2).map_or(false, |l| l.trim().is_empty()) { 3 } else { 2 }\n        } else {\n            1\n        };\n        out.push(desired_header.to_string());\n        // Exactly one blank line after header — skip any existing leading blanks\n        while rest_start \u003c lines.len() \u0026\u0026 lines[rest_start].trim().is_empty() {\n            rest_start += 1;\n        }\n        out.push(String::new());\n        out.extend(lines[rest_start..].iter().map(|l| l.to_string()));\n    } else {\n        let mut rest_start = if re.is_match(lines[0]) {\n            if lines.get(1).map_or(false, |l| l.trim().is_empty()) { 2 } else { 1 }\n        } else {\n            0\n        };\n        out.push(desired_header.to_string());\n        // Exactly one blank line after header — skip any existing leading blanks\n        while rest_start \u003c lines.len() \u0026\u0026 lines[rest_start].trim().is_empty() {\n            rest_start += 1;\n        }\n        out.push(String::new());\n        out.extend(lines[rest_start..].iter().map(|l| l.to_string()));\n    }\n\n    let mut result = out.join(line_ending);\n    if trailing_nl \u0026\u0026 !result.ends_with('\\n') {\n        result.push_str(line_ending);\n    }\n    result\n}\n\n/// Strip any bark-managed header from the file content.\npub fn strip(content: \u0026str, style: CommentStyle) -\u003e Option\u003cString\u003e {\n    let re = style.detect_regex();\n    let line_ending = if content.contains(\"\\r\\n\") { \"\\r\\n\" } else { \"\\n\" };\n    let trailing_nl = content.ends_with('\\n') || content.ends_with(\"\\r\\n\");\n\n    let lines: Vec\u003c\u0026str\u003e = content.lines().collect();\n    let has_shebang = lines.first().map_or(false, |l| l.starts_with(\"#!\"));\n\n    // Determine which line to check for header\n    let check_idx = if has_shebang { 1 } else { 0 };\n\n    // Check up to first 3 lines for a header\n    let header_idx = lines\n        .iter()\n        .enumerate()\n        .skip(check_idx)\n        .take(3)\n        .find(|(_, l)| re.is_match(l))\n        .map(|(i, _)| i);\n\n    let Some(idx) = header_idx else {\n        return None; // no header found — nothing to do\n    };\n\n    let mut out: Vec\u003c\u0026str\u003e = lines.clone();\n    out.remove(idx);\n    // Remove blank line that immediately follows where the header was, if any\n    if idx \u003c out.len() \u0026\u0026 out[idx].trim().is_empty() {\n        out.remove(idx);\n    }\n\n    let mut result = out.join(line_ending);\n    if trailing_nl \u0026\u0026 !result.ends_with('\\n') {\n        result.push_str(line_ending);\n    }\n    Some(result)\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::collections::HashMap;\n\n    fn ctx(file: \u0026str) -\u003e TemplateContext {\n        TemplateContext {\n            file: file.to_string(),\n            date: \"2026-03-19\".to_string(),\n            year: \"2026\".to_string(),\n            author: \"tester\".to_string(),\n            project: \"myproject\".to_string(),\n            filename: file.split('/').last().unwrap_or(file).trim_end_matches(\".rs\").to_string(),\n            ext: \"rs\".to_string(),\n            custom: HashMap::new(),\n        }\n    }\n\n    // ── CommentStyle::from_ext ──────────────────────────────────────────────\n\n    #[test]\n    fn slash_extensions() {\n        for ext in \u0026[\"go\", \"rs\", \"js\", \"ts\", \"tsx\", \"jsx\", \"java\", \"kt\", \"cpp\",\n                     \"c\", \"h\", \"cs\", \"swift\", \"dart\", \"zig\", \"sol\", \"proto\"] {\n            assert_eq!(CommentStyle::from_ext(ext), Some(CommentStyle::Slash),\n                \"expected Slash for .{}\", ext);\n        }\n    }\n\n    #[test]\n    fn hash_extensions() {\n        for ext in \u0026[\"py\", \"rb\", \"cr\", \"nim\", \"ex\", \"exs\", \"jl\", \"tf\", \"nix\",\n                     \"graphql\", \"md\", \"toml\", \"yaml\", \"yml\"] {\n            assert_eq!(CommentStyle::from_ext(ext), Some(CommentStyle::Hash),\n                \"expected Hash for .{}\", ext);\n        }\n    }\n\n    #[test]\n    fn css_extensions() {\n        for ext in \u0026[\"css\", \"scss\", \"sass\", \"less\", \"styl\"] {\n            assert_eq!(CommentStyle::from_ext(ext), Some(CommentStyle::Css),\n                \"expected Css for .{}\", ext);\n        }\n    }\n\n    #[test]\n    fn html_extensions() {\n        for ext in \u0026[\"html\", \"htm\", \"xml\", \"svg\", \"vue\", \"svelte\", \"astro\"] {\n            assert_eq!(CommentStyle::from_ext(ext), Some(CommentStyle::Html),\n                \"expected Html for .{}\", ext);\n        }\n    }\n\n    #[test]\n    fn unknown_extension_returns_none() {\n        assert_eq!(CommentStyle::from_ext(\"xyz\"), None);\n        assert_eq!(CommentStyle::from_ext(\"\"), None);\n        assert_eq!(CommentStyle::from_ext(\"sh\"), None);  // removed intentionally\n        assert_eq!(CommentStyle::from_ext(\"bash\"), None);\n    }\n\n    // ── CommentStyle::wrap ──────────────────────────────────────────────────\n\n    #[test]\n    fn wrap_slash() {\n        assert_eq!(CommentStyle::Slash.wrap(\"File: foo.rs\"), \"// File: foo.rs\");\n    }\n\n    #[test]\n    fn wrap_hash() {\n        assert_eq!(CommentStyle::Hash.wrap(\"File: foo.py\"), \"# File: foo.py\");\n    }\n\n    #[test]\n    fn wrap_css() {\n        assert_eq!(CommentStyle::Css.wrap(\"File: foo.css\"), \"/* File: foo.css */\");\n    }\n\n    #[test]\n    fn wrap_html() {\n        assert_eq!(CommentStyle::Html.wrap(\"File: foo.html\"), \"\u003c!-- File: foo.html --\u003e\");\n    }\n\n    // ── detect_regex ────────────────────────────────────────────────────────\n\n    #[test]\n    fn detect_regex_slash_matches() {\n        let re = CommentStyle::Slash.detect_regex();\n        assert!(re.is_match(\"// File: src/main.rs\"));\n        assert!(re.is_match(\"// anything here\"));\n        assert!(!re.is_match(\"# File: foo.py\"));\n        assert!(!re.is_match(\"\"));\n    }\n\n    #[test]\n    fn detect_regex_hash_matches() {\n        let re = CommentStyle::Hash.detect_regex();\n        assert!(re.is_match(\"# File: foo.py\"));\n        assert!(!re.is_match(\"// File: foo.rs\"));\n    }\n\n    #[test]\n    fn detect_regex_css_matches() {\n        let re = CommentStyle::Css.detect_regex();\n        assert!(re.is_match(\"/* File: foo.css */\"));\n        assert!(!re.is_match(\"// File: foo.rs\"));\n    }\n\n    #[test]\n    fn detect_regex_html_matches() {\n        let re = CommentStyle::Html.detect_regex();\n        assert!(re.is_match(\"\u003c!-- File: foo.html --\u003e\"));\n        assert!(!re.is_match(\"// File: foo.rs\"));\n    }\n\n    // ── build_header ────────────────────────────────────────────────────────\n\n    #[test]\n    fn build_header_slash() {\n        let c = ctx(\"src/main.rs\");\n        let h = build_header(CommentStyle::Slash, \"File: {{file}}\", \u0026c);\n        assert_eq!(h, \"// File: src/main.rs\");\n    }\n\n    #[test]\n    fn build_header_hash() {\n        let c = ctx(\"script.py\");\n        let h = build_header(CommentStyle::Hash, \"File: {{file}}\", \u0026c);\n        assert_eq!(h, \"# File: script.py\");\n    }\n\n    // ── analyze ─────────────────────────────────────────────────────────────\n\n    #[test]\n    fn analyze_add_new() {\n        let content = \"package main\\n\\nfunc main() {}\\n\";\n        let desired = \"// File: main.go\";\n        assert!(matches!(analyze(content, desired, CommentStyle::Slash), HeaderAction::AddNew));\n    }\n\n    #[test]\n    fn analyze_already_current() {\n        let content = \"// File: main.go\\n\\npackage main\\n\";\n        let desired = \"// File: main.go\";\n        assert!(matches!(analyze(content, desired, CommentStyle::Slash), HeaderAction::AlreadyCurrent));\n    }\n\n    #[test]\n    fn analyze_update_existing() {\n        let content = \"// File: old/path.go\\n\\npackage main\\n\";\n        let desired = \"// File: new/path.go\";\n        assert!(matches!(analyze(content, desired, CommentStyle::Slash), HeaderAction::UpdateExisting));\n    }\n\n    #[test]\n    fn analyze_skips_shebang() {\n        let content = \"#!/usr/bin/env python3\\n# File: script.py\\n\\nprint('hi')\\n\";\n        let desired = \"# File: script.py\";\n        assert!(matches!(analyze(content, desired, CommentStyle::Hash), HeaderAction::AlreadyCurrent));\n    }\n\n    // ── apply_tag ───────────────────────────────────────────────────────────\n\n    #[test]\n    fn apply_tag_empty_file() {\n        let result = apply_tag(\"\", \"// File: foo.rs\", CommentStyle::Slash);\n        assert_eq!(result, \"// File: foo.rs\\n\");\n    }\n\n    #[test]\n    fn apply_tag_add_new_has_blank_line() {\n        let content = \"package main\\n\\nfunc main() {}\\n\";\n        let result = apply_tag(content, \"// File: main.go\", CommentStyle::Slash);\n        let lines: Vec\u003c\u0026str\u003e = result.lines().collect();\n        assert_eq!(lines[0], \"// File: main.go\");\n        assert_eq!(lines[1], \"\");              // blank line\n        assert_eq!(lines[2], \"package main\");\n    }\n\n    #[test]\n    fn apply_tag_update_replaces_not_duplicates() {\n        let content = \"// File: old.go\\n\\npackage main\\n\";\n        let result = apply_tag(content, \"// File: new.go\", CommentStyle::Slash);\n        assert!(result.starts_with(\"// File: new.go\\n\"));\n        assert!(!result.contains(\"// File: old.go\"));\n    }\n\n    #[test]\n    fn apply_tag_preserves_shebang() {\n        let content = \"#!/usr/bin/env python3\\nprint('hi')\\n\";\n        let result = apply_tag(content, \"# File: script.py\", CommentStyle::Hash);\n        let lines: Vec\u003c\u0026str\u003e = result.lines().collect();\n        assert_eq!(lines[0], \"#!/usr/bin/env python3\");\n        assert_eq!(lines[1], \"# File: script.py\");\n        assert_eq!(lines[2], \"\");             // blank line\n        assert_eq!(lines[3], \"print('hi')\");\n    }\n\n    #[test]\n    fn apply_tag_crlf_preserved() {\n        let content = \"package main\\r\\n\\r\\nfunc main() {}\\r\\n\";\n        let result = apply_tag(content, \"// File: main.go\", CommentStyle::Slash);\n        assert!(result.contains(\"\\r\\n\"), \"CRLF should be preserved\");\n        assert!(result.starts_with(\"// File: main.go\\r\\n\"));\n    }\n\n    #[test]\n    fn apply_tag_exactly_one_blank_line_after_header() {\n        // Even if content starts with multiple blanks, we should get exactly one\n        let content = \"\\n\\n\\npackage main\\n\";\n        let result = apply_tag(content, \"// File: main.go\", CommentStyle::Slash);\n        let lines: Vec\u003c\u0026str\u003e = result.lines().collect();\n        assert_eq!(lines[0], \"// File: main.go\");\n        assert_eq!(lines[1], \"\");\n        assert_eq!(lines[2], \"package main\");\n    }\n\n    #[test]\n    fn apply_tag_trailing_newline_preserved() {\n        let content = \"package main\\n\";\n        let result = apply_tag(content, \"// File: main.go\", CommentStyle::Slash);\n        assert!(result.ends_with('\\n'));\n    }\n\n    // ── strip ────────────────────────────────────────────────────────────────\n\n    #[test]\n    fn strip_removes_header_and_blank() {\n        let content = \"// File: main.go\\n\\npackage main\\n\";\n        let result = strip(content, CommentStyle::Slash);\n        assert!(result.is_some());\n        let stripped = result.unwrap();\n        assert!(!stripped.contains(\"// File:\"));\n        assert!(stripped.starts_with(\"package main\"));\n    }\n\n    #[test]\n    fn strip_returns_none_when_no_header() {\n        let content = \"package main\\n\\nfunc main() {}\\n\";\n        assert!(strip(content, CommentStyle::Slash).is_none());\n    }\n\n    #[test]\n    fn strip_preserves_shebang() {\n        let content = \"#!/usr/bin/env python3\\n# File: script.py\\n\\nprint('hi')\\n\";\n        let result = strip(content, CommentStyle::Hash).unwrap();\n        assert!(result.starts_with(\"#!/usr/bin/env python3\"));\n        assert!(!result.contains(\"# File:\"));\n        assert!(result.contains(\"print('hi')\"));\n    }\n\n    #[test]\n    fn strip_css_header() {\n        let content = \"/* File: styles.css */\\n\\nbody { margin: 0; }\\n\";\n        let result = strip(content, CommentStyle::Css).unwrap();\n        assert!(!result.contains(\"/* File:\"));\n        assert!(result.contains(\"body { margin: 0; }\"));\n    }\n\n    #[test]\n    fn strip_html_header() {\n        let content = \"\u003c!-- File: index.html --\u003e\\n\\n\u003chtml\u003e\u003c/html\u003e\\n\";\n        let result = strip(content, CommentStyle::Html).unwrap();\n        assert!(!result.contains(\"\u003c!-- File:\"));\n        assert!(result.contains(\"\u003chtml\u003e\u003c/html\u003e\"));\n    }\n\n    // ── shebang + existing header edge cases (covers lines 138 and 145) ──────\n\n    #[test]\n    fn apply_tag_shebang_with_existing_header_and_blank() {\n        // shebang → existing header → blank line → code\n        // Line 138: the `{ 3 }` branch — skip header + blank → rest_start = 3\n        let content = \"#!/usr/bin/env python3\\n# File: old.py\\n\\nprint('hi')\\n\";\n        let result = apply_tag(content, \"# File: script.py\", CommentStyle::Hash);\n        let lines: Vec\u003c\u0026str\u003e = result.lines().collect();\n        assert_eq!(lines[0], \"#!/usr/bin/env python3\");\n        assert_eq!(lines[1], \"# File: script.py\");\n        assert_eq!(lines[2], \"\");\n        assert_eq!(lines[3], \"print('hi')\");\n        // Old header must be replaced, not duplicated\n        assert_eq!(result.matches(\"# File:\").count(), 1);\n    }\n\n    #[test]\n    fn apply_tag_shebang_existing_header_multiple_blanks() {\n        // shebang → existing header → multiple blank lines → code\n        // Line 145: rest_start += 1 in blank-dedup loop (shebang path)\n        let content = \"#!/usr/bin/env python3\\n# File: old.py\\n\\n\\n\\nprint('hi')\\n\";\n        let result = apply_tag(content, \"# File: script.py\", CommentStyle::Hash);\n        let lines: Vec\u003c\u0026str\u003e = result.lines().collect();\n        assert_eq!(lines[0], \"#!/usr/bin/env python3\");\n        assert_eq!(lines[1], \"# File: script.py\");\n        assert_eq!(lines[2], \"\");             // exactly one blank\n        assert_eq!(lines[3], \"print('hi')\"); // multiple blanks collapsed\n    }\n}\n","traces":[{"line":14,"address":[6829840],"length":1,"stats":{"Line":2}},{"line":17,"address":[6670211],"length":1,"stats":{"Line":2}},{"line":31,"address":[6829916],"length":1,"stats":{"Line":2}},{"line":34,"address":[6831317,6831389],"length":1,"stats":{"Line":2}},{"line":42,"address":[6831370],"length":1,"stats":{"Line":2}},{"line":44,"address":[6831921],"length":1,"stats":{"Line":3}},{"line":46,"address":[6832155,6832083],"length":1,"stats":{"Line":3}},{"line":48,"address":[6943896],"length":1,"stats":{"Line":1}},{"line":50,"address":[6672320],"length":1,"stats":{"Line":2}},{"line":55,"address":[6829296],"length":1,"stats":{"Line":6}},{"line":56,"address":[6941091],"length":1,"stats":{"Line":3}},{"line":57,"address":[6941122],"length":1,"stats":{"Line":6}},{"line":58,"address":[6829463],"length":1,"stats":{"Line":2}},{"line":59,"address":[6829582],"length":1,"stats":{"Line":1}},{"line":60,"address":[6941464],"length":1,"stats":{"Line":1}},{"line":66,"address":[6669104],"length":1,"stats":{"Line":3}},{"line":67,"address":[6669123],"length":1,"stats":{"Line":3}},{"line":68,"address":[6829138],"length":1,"stats":{"Line":2}},{"line":69,"address":[6940921],"length":1,"stats":{"Line":2}},{"line":70,"address":[6940944],"length":1,"stats":{"Line":1}},{"line":71,"address":[6829207],"length":1,"stats":{"Line":1}},{"line":73,"address":[6829228],"length":1,"stats":{"Line":8}},{"line":84,"address":[6944283,6944289,6944080],"length":1,"stats":{"Line":2}},{"line":85,"address":[6832392],"length":1,"stats":{"Line":2}},{"line":86,"address":[6944176,6944243],"length":1,"stats":{"Line":8}},{"line":90,"address":[6834930,6834448,6834936],"length":1,"stats":{"Line":2}},{"line":91,"address":[6834514],"length":1,"stats":{"Line":6}},{"line":92,"address":[6674507,6674575],"length":1,"stats":{"Line":9}},{"line":93,"address":[6834627],"length":1,"stats":{"Line":3}},{"line":94,"address":[6834720,6834666],"length":1,"stats":{"Line":10}},{"line":95,"address":[68 ress":[6833898,6834072],"length":1,"stats":{"Line":8}},{"line":204,"address":[6834281,6834107,6834210],"length":1,"stats":{"Line":9}},{"line":205,"address":[6834315],"length":1,"stats":{"Line":4}},{"line":207,"address":[6834125],"length":1,"stats":{"Line":3}}],"covered":93,"coverable":93},{"path":["/","home","logan","bark","src","lib.rs"],"content":"// File: src/lib.rs\npub mod backup;\npub mod cli;\npub mod config;\npub mod header;\npub mod processor;\npub mod template;\npub mod tree;\npub mod walker;\npub mod watcher;\n\nuse anyhow::Result;\nuse clap::Parser;\nuse cli::{Cli, Commands};\nuse colored::Colorize;\nuse config::Config;\nuse processor::Processor;\nuse std::path::PathBuf;\nuse std::sync::Arc;\n\npub fn run() -\u003e Result\u003c()\u003e {\n    run_with_cli(Cli::parse())\n}\n\npub fn run_with_cli(cli: Cli) -\u003e Result\u003c()\u003e {\n    // Load config: explicit flag → search upward → defaults\n    let config = match \u0026cli.config {\n        Some(path) =\u003e Config::from_file(path)?,\n        None =\u003e Config::find_and_load(\u0026std::env::current_dir()?)?\n            .unwrap_or_default(),\n    };\n\n    let command = cli.command.unwrap_or_else(|| Commands::Tag(cli::TagArgs::default()));\n\n    match command {\n        Commands::Tag(args) =\u003e {\n            let root = args.root.clone()\n                .unwrap_or_else(|| PathBuf::from(\".\"))\n                .canonicalize()\n                .unwrap_or_else(|_| PathBuf::from(\".\"));\n\n            // Configure rayon thread pool\n            if args.threads \u003e 0 {\n                rayon::ThreadPoolBuilder::new()\n                    .num_threads(args.threads)\n                    .build_global()\n                    .ok();\n            }\n\n            let max_size = args.max_size.unwrap_or(config.general.max_file_size);\n            let mut cfg = config.clone();\n            cfg.general.max_file_size = max_size;\n\n            let backup_dir = root.join(\u0026args.backup_dir);\n            let output_path = root.join(\u0026args.output);\n            let create_backups = !args.force \u0026\u0026 cfg.general.backup;\n\n            let config = Arc::new(cfg);\n\n            // Generate tree (skip in dry-run mode)\n            if !args.no_tree {\n                if args.dry_run {\n                    println!(\"{} would write {}\", \"tree\".dimmed(), output_path.display());\n                } else if output_path.is_dir() {\n                    eprintln!(\n                        \"{} '{}' is a directory — remove it or use --output to pick a different name\",\n                        \"warn\".yellow(),\n                        output_path.display()\n                    );\n                } else {\n                    let gen = tree::TreeGenerator::new(\u0026root, \u0026backup_dir, \u0026output_path);\n                    match gen.generate(\u0026output_path) {\n                        Ok(_) =\u003e {\n                            if cli.verbose {\n                                println!(\"{} tree written to {}\", \"bark\".green().bold(), output_path.display());\n                            }\n                        }\n                        Err(e) =\u003e eprintln!(\"{} tree generation: {}\", \"warn\".yellow(), e),\n                    }\n                }\n            }\n\n            let proc = Processor::new(\n                Arc::clone(\u0026config),\n                \u0026root,\n                backup_dir,\n                args.dry_run,\n                cli.verbose,\n                create_backups,\n                args.template,\n            );\n\n            let stats = proc.run_tag(\u0026root, \u0026output_path)?;\n\n            print_tag_summary(\u0026stats, args.dry_run);\n        }\n\n        Commands::Strip(args) =\u003e {\n            let root = args.root.clone()\n                .unwrap_or_else(|| PathBuf::from(\".\"))\n                .canonicalize()\n                .unwrap_or_else(|_| PathBuf::from(\".\"));\n\n            let backup_dir = root.join(\u0026args.backup_dir);\n            let output_path = root.join(\u0026config.general.output);\n            let config = Arc::new(config);\n\n            let proc = Processor::new(\n                Arc::clone(\u0026config),\n                \u0026root,\n                backup_dir,\n                args.dry_run,\n                cli.verbose,\n                args.backup,\n                None,\n            );\n\n            let stats = proc.run_strip(\u0026root, \u0026output_path, args.backup)?;\n            print_strip_summary(\u0026stats, args.dry_run);\n        }\n\n        Commands::Tree(args) =\u003e {\n            let root = args.root.clone()\n                .unwrap_or_else(|| PathBuf::from(\".\"))\n                .canonicalize()\n                .unwrap_or_else(|_| PathBuf::from(\".\"));\n\n            let output_path = root.join(\u0026args.output);\n\n            if output_path.is_dir() {\n                anyhow::bail!(\n                    \"'{}' is a directory — use --output to specify a different filename\",\n                    output_path.display()\n                );\n            }\n\n            let backup_dir = root.join(config.general.backup_dir.clone());\n            let gen = tree::TreeGenerator::new(\u0026root, \u0026backup_dir, \u0026output_path);\n            gen.generate(\u0026output_path)?;\n            println!(\"{} tree written to {}\", \"bark\".green().bold(), output_path.display());\n        }\n\n        Commands::Watch(args) =\u003e {\n            let root = args.root.clone()\n                .unwrap_or_else(|| PathBuf::from(\".\"))\n                .canonicalize()\n                .unwrap_or_else(|_| PathBuf::from(\".\"));\n\n            let backup_dir = root.join(\u0026config.general.backup_dir);\n            let output_path = root.join(\u0026args.output);\n            let debounce = args.debounce;\n            let config = Arc::new(config);\n\n            let proc = Arc::new(Processor::new(\n                Arc::clone(\u0026config),\n                \u0026root,\n                backup_dir,\n                args.dry_run,\n                cli.verbose,\n                true,\n                None,\n            ));\n\n            let fw = watcher::FileWatcher::new(\n                proc,\n                debounce,\n                output_path,\n                args.dry_run,\n            );\n            fw.run(\u0026root)?;\n        }\n\n        Commands::Restore(args) =\u003e {\n            let root = args.root.clone()\n                .unwrap_or_else(|| std::env::current_dir().unwrap_or_else(|_| PathBuf::from(\".\")));\n            let backup_dir = root.join(\u0026args.backup_dir);\n            let mgr = backup::BackupManager::new(backup_dir, false);\n\n            let mut entries = mgr.list_backups(args.file.as_deref(), \u0026root)?;\n\n            if entries.is_empty() {\n                println!(\"{} No backups found.\", \"bark\".green().bold());\n                return Ok(());\n            }\n\n            if args.latest {\n                // Restore most recent backup per original file\n                let mut seen = std::collections::HashSet::new();\n                entries.retain(|e| seen.insert(e.original.clone()));\n                for entry in \u0026entries {\n                    mgr.restore(entry, args.dry_run)?;\n                    if !args.dry_run {\n                        println!(\"{} restored: {}\", \"bark\".green().bold(), entry.original.display());\n                    }\n                }\n                return Ok(());\n            }\n\n            // Interactive: list backups and let user pick\n            println!(\"{}\", \"Available backups:\".bold());\n            for (i, e) in entries.iter().enumerate() {\n                println!(\n                    \"  [{:\u003e2}] {} ({})\",\n                    i + 1,\n                    e.original.display(),\n                    e.timestamp.format(\"%Y-%m-%d %H:%M:%S\")\n                );\n            }\n : bool,\n        verbose: bool,\n        create_backups: bool,\n        template_override: Option\u003cString\u003e,\n    ) -\u003e Self {\n        let author = get_git_author().unwrap_or_else(|_| \"unknown\".into());\n        let project = get_project_name(root);\n\n        Self {\n            config,\n            backup_mgr: BackupManager::new(backup_dir, create_backups),\n            dry_run,\n            verbose,\n            template_override,\n            author,\n            project,\n        }\n    }\n\n    pub fn run_tag(\u0026self, root: \u0026Path, output_path: \u0026Path) -\u003e anyhow::Result\u003cStats\u003e {\n        let walker = Walker::new(\n            root.to_path_buf(),\n            Arc::clone(\u0026self.config),\n            output_path.to_path_buf(),\n            self.backup_mgr.backup_dir.clone(),\n        );\n\n        let entries = walker.walk();\n        let stats = Stats::default();\n\n        entries.par_iter().for_each(|entry| {\n            match self.tag_file(entry, root) {\n                Ok(action) =\u003e match action {\n                    TagResult::Tagged  =\u003e { stats.tagged.fetch_add(1, Ordering::Relaxed); }\n                    TagResult::Updated =\u003e { stats.updated.fetch_add(1, Ordering::Relaxed); }\n                    TagResult::Current =\u003e { stats.current.fetch_add(1, Ordering::Relaxed); }\n                },\n                Err(e) =\u003e {\n                    stats.errors.fetch_add(1, Ordering::Relaxed);\n                    eprintln!(\"{} {}: {}\", \"error\".red(), entry.rel_path.display(), e);\n                }\n            }\n        });\n\n        Ok(stats)\n    }\n\n    pub fn run_strip(\n        \u0026self,\n        root: \u0026Path,\n        output_path: \u0026Path,\n        strip_backup: bool,\n    ) -\u003e anyhow::Result\u003cStats\u003e {\n        let backup_dir = self.backup_mgr.backup_dir.clone();\n        let walker = Walker::new(\n            root.to_path_buf(),\n            Arc::clone(\u0026self.config),\n            output_path.to_path_buf(),\n            backup_dir.clone(),\n        );\n\n        let entries = walker.walk();\n        let strip_mgr = BackupManager::new(backup_dir, strip_backup);\n        let stats = Stats::default();\n\n        entries.par_iter().for_each(|entry| {\n            match self.strip_file(entry, root, \u0026strip_mgr) {\n                Ok(did_strip) =\u003e {\n                    if did_strip {\n                        stats.stripped.fetch_add(1, Ordering::Relaxed);\n                    } else {\n                        stats.current.fetch_add(1, Ordering::Relaxed);\n                    }\n                }\n                Err(e) =\u003e {\n                    stats.errors.fetch_add(1, Ordering::Relaxed);\n                    eprintln!(\"{} {}: {}\", \"error\".red(), entry.rel_path.display(), e);\n                }\n            }\n        });\n\n        Ok(stats)\n    }\n\n    /// Tag a single file by its absolute path (used by watcher).\n    /// Respects the same config rules as the full walker (skip list, custom extensions, excludes).\n    pub fn tag_file_by_path(\u0026self, abs_path: \u0026Path, root: \u0026Path) -\u003e anyhow::Result\u003c()\u003e {\n        let rel_path = abs_path.strip_prefix(root).unwrap_or(abs_path).to_path_buf();\n        let ext = abs_path\n            .extension()\n            .map(|e| e.to_string_lossy().to_lowercase())\n            .unwrap_or_default();\n\n        // Respect the extension skip list\n        if self.config.extensions.skip.contains(\u0026ext.to_string()) {\n            return Ok(());\n        }\n\n        // Check custom extensions first, then fall back to built-ins\n        let style = self.config.extensions.custom.iter()\n            .find(|c| c.ext == ext.as_str())\n            .and_then(|c| match c.style.as_str() {\n                \"slash\" =\u003e Some(CommentStyle::Slash),\n                \"hash\"  =\u003e Some(CommentStyle::Hash),\n                \"css\"   =\u003e Some(CommentStyle::Css),\n                \"html\"  =\u003e Some(CommentStyle::Html),\n                _ =\u003e None,\n            })\n            .or_else(|| CommentStyle::from_ext(\u0026ext));\n\n        let style = match style {\n            Some(s) =\u003e s,\n            None =\u003e return Ok(()),\n        };\n\n        // Respect config exclude patterns\n        let rel_str = rel_path.to_string_lossy().replace('\\\\', \"/\");\n        if crate::walker::is_path_excluded(\u0026rel_str, \u0026self.config.exclude.patterns) {\n            return Ok(());\n        }\n\n        let entry = WalkEntry { abs_path: abs_path.to_path_buf(), rel_path, style };\n        self.tag_file(\u0026entry, root)?;\n        Ok(())\n    }\n\n    fn tag_file(\u0026self, entry: \u0026WalkEntry, root: \u0026Path) -\u003e anyhow::Result\u003cTagResult\u003e {\n        let content = std::fs::read_to_string(\u0026entry.abs_path)?;\n\n        // Pick template: CLI override → per-extension config override → config default\n        let ext = entry.abs_path\n            .extension()\n            .map(|e| e.to_string_lossy().to_string())\n            .unwrap_or_default();\n        let template = self.template_override\n            .as_deref()\n            .or_else(|| self.config.template.overrides.get(\u0026ext).map(|s| s.as_str()))\n            .unwrap_or(\u0026self.config.template.default)\n            .to_string();\n\n        let ctx = TemplateContext::new(\n            \u0026entry.rel_path,\n            \u0026self.config.template.date_format,\n            self.author.clone(),\n            self.project.clone(),\n            self.config.template.variables.clone(),\n        );\n\n        let desired = header::build_header(entry.style, \u0026template, \u0026ctx);\n\n        // Analyze once and reuse the result — avoids a redundant second call\n        let action = header::analyze(\u0026content, \u0026desired, entry.style);\n\n        match action {\n            HeaderAction::AlreadyCurrent =\u003e {\n                if self.verbose {\n                    println!(\"{} {}\", \"current\".dimmed(), entry.rel_path.display());\n                }\n                Ok(TagResult::Current)\n            }\n            HeaderAction::UpdateExisting | HeaderAction::AddNew =\u003e {\n                let result_type = if matches!(action, HeaderAction::UpdateExisting) {\n                    TagResult::Updated\n                } else {\n                    TagResult::Tagged\n                };\n\n                if self.dry_run {\n                    let label = if matches!(result_type, TagResult::Updated) {\n                        \"would update\".blue()\n                    } else {\n                        \"would tag\".purple()\n                    };\n                    println!(\"{} {}\", label, entry.rel_path.display());\n                    return Ok(result_type);\n                }\n\n                // Create backup\n                self.backup_mgr.backup(\u0026entry.abs_path, root)?;\n\n                // Apply header\n                let new_content = header::apply_tag(\u0026content, \u0026desired, entry.style);\n                BackupManager::write_atomic(\u0026entry.abs_path, \u0026new_content)?;\n\n                let label = if matches!(result_type, TagResult::Updated) {\n                    \"updated\".blue()\n                } else {\n                    \"tagged\".purple()\n                };\n                if self.verbose {\n                    println!(\"{} {}\", label, entry.rel_path.display());\n                }\n                Ok(result_type)\n            }\n        }\n    }\n\n    fn strip_file(\n        \u0026self,\n        entry: \u0026WalkEntry,\n        root: \u0026Path,\n        backup_mgr: \u0026BackupManager,\n    ) -\u003e anyhow::Result\u003cbool\u003e {\n        let content = std::fs::read_to_string(\u0026entry.abs_path)?;\n\n        match header::strip(\u0026content, entry.style) {\n            None =\u003e Ok(false), // no header found\n            Some(new_content) =\u003e {\n                if self.dry_run {\n                    println!(\"{} {}\", \"would strip\".yellow(), entry.rel_path.display());\n                    return Ok(true);\n                }\n                backup_mgr.backup(\u0026entry.abs_path, root)?;\n                BackupManager::write_atomic(\u0026entry.abs_path, \u0026new_content)?;\n                if self.verbose {\n                    println!(\"{} {}\", \"stripped\".yellow(), entry.rel_path.display());\n                }\n                Ok(true)\n            }\n        }\n    }\n}\n\nenum TagResult {\n    Tagged,\n    Updated,\n    Current,\n}\n\nfn get_git_author() -\u003e anyhow::Result\u003cString\u003e {\n    let out = std::process::Command::new(\"git\")\n        .args([\"config\", \"user.name\"])\n        .output()?;\n    let name = String::from_utf8_lossy(\u0026out.stdout).trim().to_string();\n    if name.is_empty() {\n        anyhow::bail!(\"empty git user.name\");\n    }\n    Ok(name)\n}\n\nfn get_project_name(root: \u0026Path) -\u003e String {\n    root.canonicalize()\n        .unwrap_or_else(|_| root.to_path_buf())\n        .file_name()\n        .map(|n| n.to_string_lossy().to_string())\n        .unwrap_or_else(|| \"project\".into())\n}\n","traces":[{"line":34,"address":[6528816,6529593,6529659],"length":1,"stats":{"Line":3}},{"line":43,"address":[7107536,7107552],"length":1,"stats":{"Line":9}},{"line":44,"address":[6958383],"length":1,"stats":{"Line":4}},{"line":48,"address":[6821114],"length":1,"stats":{"Line":5}},{"line":57,"address":[6529696,6530545,6530551],"length":1,"stats":{"Line":4}},{"line":59,"address":[6821786],"length":1,"stats":{"Line":1}},{"line":60,"address":[6529848,6529920],"length":1,"stats":{"Line":5}},{"line":61,"address":[6959252,6959314],"length":1,"stats":{"Line":5}},{"line":62,"address":[6821986],"length":1,"stats":{"Line":4}},{"line":65,"address":[6822127],"length":1,"stats":{"Line":4}},{"line":66,"address":[6530216],"length": plate: \u0026str, ctx: \u0026TemplateContext) -\u003e String {\n    let mut result = template.to_string();\n    result = result.replace(\"{{file}}\", \u0026ctx.file);\n    result = result.replace(\"{{date}}\", \u0026ctx.date);\n    result = result.replace(\"{{year}}\", \u0026ctx.year);\n    result = result.replace(\"{{author}}\", \u0026ctx.author);\n    result = result.replace(\"{{project}}\", \u0026ctx.project);\n    result = result.replace(\"{{filename}}\", \u0026ctx.filename);\n    result = result.replace(\"{{ext}}\", \u0026ctx.ext);\n    for (k, v) in \u0026ctx.custom {\n        result = result.replace(\u0026format!(\"{{{{{}}}}}\", k), v);\n    }\n    result\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    fn make_ctx(file: \u0026str) -\u003e TemplateContext {\n        TemplateContext {\n            file: file.to_string(),\n            date: \"2026-03-19\".to_string(),\n            year: \"2026\".to_string(),\n            author: \"alice\".to_string(),\n            project: \"myproject\".to_string(),\n            filename: \"main\".to_string(),\n            ext: \"rs\".to_string(),\n            custom: std::collections::HashMap::from([\n                (\"team\".to_string(), \"platform\".to_string()),\n            ]),\n        }\n    }\n\n    #[test]\n    fn render_file_var() {\n        let ctx = make_ctx(\"src/main.rs\");\n        assert_eq!(render(\"File: {{file}}\", \u0026ctx), \"File: src/main.rs\");\n    }\n\n    #[test]\n    fn render_all_builtins() {\n        let ctx = make_ctx(\"src/lib.rs\");\n        let tpl = \"{{file}} {{date}} {{year}} {{author}} {{project}} {{filename}} {{ext}}\";\n        let result = render(tpl, \u0026ctx);\n        assert!(result.contains(\"src/lib.rs\"));\n        assert!(result.contains(\"2026-03-19\"));\n        assert!(result.contains(\"2026\"));\n        assert!(result.contains(\"alice\"));\n        assert!(result.contains(\"myproject\"));\n        assert!(result.contains(\"main\"));\n        assert!(result.contain :config::Config;\nuse crate::header::CommentStyle;\nuse ignore::WalkBuilder;\nuse std::io::Read;\nuse std::path::{Path, PathBuf};\nuse std::sync::Arc;\n\npub struct WalkEntry {\n    pub abs_path: PathBuf,\n    pub rel_path: PathBuf,\n    pub style: CommentStyle,\n}\n\npub struct Walker {\n    root: PathBuf,\n    config: Arc\u003cConfig\u003e,\n    output_path: PathBuf,\n    backup_dir: PathBuf,\n}\n\nimpl Walker {\n    pub fn new(\n        root: PathBuf,\n        config: Arc\u003cConfig\u003e,\n        output_path: PathBuf,\n        backup_dir: PathBuf,\n    ) -\u003e Self {\n        Self { root, config, output_path, backup_dir }\n    }\n\n    pub fn walk(\u0026self) -\u003e Vec\u003cWalkEntry\u003e {\n        let output_canon = self.output_path.canonicalize().unwrap_or_else(|_| self.output_path.clone());\n        let backup_canon = self.backup_dir.canonicalize().unwrap_or_else(|_| self.backup_dir.clone());\n\n        let walker = WalkBuilder::new(\u0026self.root)\n            .git_ignore(true)\n            .git_global(true)\n            .git_exclude(true)\n            .add_custom_ignore_filename(\".barkignore\")\n            .build();\n\n        let mut entries = Vec::new();\n\n        for result in walker {\n            let dir_entry = match result {\n                Ok(e) =\u003e e,\n                Err(_) =\u003e continue,\n            };\n\n            let path = dir_entry.path();\n\n            // Only process files\n            if !path.is_file() {\n                continue;\n            }\n\n            let abs = path.canonicalize().unwrap_or_else(|_| path.to_path_buf());\n\n            // Skip our own output / backup files\n            if abs == output_canon || abs.starts_with(\u0026backup_canon) {\n                continue;\n            }\n\n            // Get extension\n            let ext = match path.extension() {\n                Some(e) =\u003e e.to_string_lossy().to_lowercase(),\n                None =\u003e continue,\n            };\n\n            /
